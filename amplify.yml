version: 1
backend:
  phases:
    build:
      commands:
        - cd lambda && npm ci && npm run build && cd ..
        - npm ci --cache .npm --prefer-offline
        - npx cdk bootstrap
        - npx cdk deploy TexasCityApiStack --require-approval never
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - echo "export const environment = { production: true, apiUrl: '${API_URL:-}' };" > src/environments/environment.prod.ts
        - npm run build
  artifacts:
    baseDirectory: dist/texas2/browser
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
