version: 1
backend:
  phases:
    preBuild:
      commands:
        # Build the Lambda bundle before CDK synth so Code.fromAsset finds the artifact
        - cd lambda && npm ci && npm run build && cd ..
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
