version: 1
backend:
  phases:
    build:
      commands:
        - cd lambda && npm ci && npm run build && cd ..
        - npm ci --cache .npm --prefer-offline
        - npx cdk bootstrap
        - npx cdk deploy TexasCityApiStack --require-approval never
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
