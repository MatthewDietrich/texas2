<header class="nav">
  <div class="wrap nav-inner">
    @if (variant() === "page") {
      <button class="icon-btn" (click)="goBack()" aria-label="Back">
        <svg class="ic"><use href="#i-back"></use></svg>
      </button>
    }

    <a class="brand" routerLink="/">
      <img class="mark" [src]="themeService.mapSrc()" alt="" />
      Texas City Snapshot
    </a>

    <div class="nav-actions">
      @if (variant() === "page") {
        <a class="icon-btn" routerLink="/" aria-label="Home">
          <svg class="ic"><use href="#i-home"></use></svg>
        </a>
      }
      <a class="icon-btn" routerLink="/mostsearched" aria-label="Leaderboard">
        <svg class="ic"><use href="#i-trophy"></use></svg>
      </a>
      <div class="theme-menu">
        <button
          class="icon-btn"
          aria-haspopup="true"
          [attr.aria-expanded]="themeMenuOpen()"
          aria-label="Color theme"
          (click)="toggleThemeMenu()"
        >
          <span class="swatch-dot {{ activeTheme().cls }}"></span>
        </button>
        @if (themeMenuOpen()) {
          <div class="theme-dropdown" role="menu">
            @for (t of themes; track t.value) {
              <button
                class="theme-option"
                role="menuitemradio"
                [attr.aria-checked]="themeService.theme() === t.value"
                (click)="selectTheme(t.value)"
              >
                <span class="swatch-dot {{ t.cls }}"></span>
                <span>{{ t.label }}</span>
              </button>
            }
          </div>
        }
      </div>
      <span class="nav-divider"></span>
      <button
        class="icon-btn"
        (click)="themeService.toggleMode()"
        aria-label="Toggle light or dark"
      >
        @if (themeService.mode() === "light") {
          <svg class="ic"><use href="#i-moon"></use></svg>
        } @else {
          <svg class="ic"><use href="#i-sun"></use></svg>
        }
      </button>
    </div>
  </div>
</header>
